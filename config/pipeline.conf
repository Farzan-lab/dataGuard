# ================================================
#  DataGuard — Pipeline Configuration
# ================================================


# ─── Paths ──────────────────────────────────────

INCOMING_DIR="data/incoming"       # Raw files land here
VALID_DIR="data/valid"             # Validated/approved files
QUARANTINE_DIR="data/quarantine"   # Rejected/quarantined files
PROCESSED_DIR="data/processed"     # Final output directory
LOG_DIR="logs"                     # Log files directory
REPORT_DIR="reports"               # HTML reports directory


# ─── Validation Rules ───────────────────────────

MIN_ROWS=10            # Minimum acceptable row count
MAX_NULL_PCT=50        # Maximum allowable missing/null values percentage (0-100)
AMOUNT_MIN=0           # Minimum allowable value for the 'amount' column
AMOUNT_MAX=10000       # Maximum allowable value for the 'amount' column


# ─── Anomaly Detection ──────────────────────────

ALERT_DROP_PCT=20      # Trigger alert if today's sales are X% lower than the average


# ─── Accepted Formats ───────────────────────────

ACCEPTED_EXTENSIONS="csv json tsv API"   # e.g., csv json tsv


# ─── Project Metadata ───────────────────────────

PROJECT_NAME="DataGuard"
VERSION="1.0.0"